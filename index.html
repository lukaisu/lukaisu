<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Lukaisu</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <main class="shell">
    <header class="brand">
      <img src="/icon.svg" alt="" class="brand-icon" width="72" height="72" />
      <h1>Lukaisu</h1>
      <p class="tagline">Learn languages by reading — on your own LWT server.</p>
    </header>

    <!-- Server picker form -->
    <form id="server-form" class="card" hidden>
      <div class="toggle-row">
        <span class="toggle-label" id="official-label">Use the official server</span>
        <label class="switch">
          <input
            type="checkbox"
            id="official-toggle"
            role="switch"
            aria-labelledby="official-label"
            checked
          />
          <span class="switch-track" aria-hidden="true"></span>
        </label>
      </div>

      <label for="server-input">LWT server</label>
      <input
        id="server-input"
        name="server"
        type="text"
        inputmode="url"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        placeholder="lwt.example.org"
        required
        readonly
      />
      <p class="hint" id="server-hint">
        Connect to the public <a href="https://lwt-online.org" target="_blank" rel="noopener">LWT</a>
        server at lwt-online.org.
      </p>
      <p id="form-error" class="error" role="alert" hidden></p>
      <button id="connect-btn" type="submit">Connect</button>
    </form>

    <!-- Auto-connect status (saved server found at launch) -->
    <section id="connecting" class="card" hidden>
      <p class="status">
        <span class="spinner" aria-hidden="true"></span>
        Connecting to <strong id="connecting-server"></strong>…
      </p>
      <button id="change-server-btn" type="button" class="secondary">Change server</button>
    </section>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
